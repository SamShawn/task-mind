version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: taskmind-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: taskmind
    networks:
      - taskmind-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: taskmind-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/taskmind
      - JWT_SECRET=${JWT_SECRET:-taskmind_jwt_secret}
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - taskmind-network
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: taskmind-client
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - taskmind-network
    restart: unless-stopped

volumes:
  mongodb-data:

networks:
  taskmind-network:
    driver: bridge
